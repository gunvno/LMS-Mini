      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CONFIG_MINIO_URL: http://minio:9000
      CONFIG_MINIO_ACCESS_KEY: ${CONFIG_MINIO_ACCESS_KEY:-minioadmin}
      CONFIG_MINIO_SECRET_KEY: ${CONFIG_MINIO_SECRET_KEY:-minioadmin}
      CONFIG_MINIO_BUCKET: lms-mini
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json
    volumes:
      - ./notice-service/logs:/app/logs
      - ./notice-service/firebase-service-account.json:/app/firebase-service-account.json:ro

  billing-service:
    container_name: lms-billing-service
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: billing-service
    restart: unless-stopped
    depends_on:
      consul:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/lms_billing_service?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_SCHEMA: lms_billing_service
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PAYOS_ENABLED: ${PAYOS_ENABLED:-false}
      PAYOS_BASE_URL: ${PAYOS_BASE_URL:-https://api-merchant.payos.vn}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:-}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-http://localhost:3001/payment/success}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-http://localhost:3001/payment/cancel}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:?Set INTERNAL_SERVICE_KEY in .env}
      CONFIG_MINIO_URL: http://minio:9000
      CONFIG_MINIO_ACCESS_KEY: ${CONFIG_MINIO_ACCESS_KEY:-minioadmin}
      CONFIG_MINIO_SECRET_KEY: ${CONFIG_MINIO_SECRET_KEY:-minioadmin}
      CONFIG_MINIO_BUCKET: lms-mini
    volumes:
      - ./billing-service/logs:/app/logs

volumes:
  lms-mini-mysql-data:
  lms-mini-minio-data:
