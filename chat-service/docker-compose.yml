services:
  api:
    container_name: lms-chat-service
    build:
      context: ..
      dockerfile: chat-service/Dockerfile
    image: lms-mini/chat-service:v1
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-lms-mini-internal-change-me}
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/lms_chat_service?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_CLOUD_CONSUL_HOST: host.docker.internal
      SPRING_CLOUD_CONSUL_PORT: 8500
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      CHATBOT_RATE_LIMIT_PER_MINUTE: ${CHATBOT_RATE_LIMIT_PER_MINUTE:-20}
      CHAT_ALLOWED_ORIGINS: ${CHAT_ALLOWED_ORIGINS:-http://localhost:3001}
    ports:
      - "8089:8089"
    volumes:
      - ./logs:/app/logs
