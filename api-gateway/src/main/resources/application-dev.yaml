server:
  port: ${PORT:8080}
  shutdown: graceful
  http2:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: info,health,prometheus,metrics
  endpoint:
    health:
      show-details: always

config:
  service-name: lms-api-gateway-service
  api:
    authn: ${CONFIG_API_AUTHN}
    author: ${CONFIG_API_AUTHOR}
    course: ${CONFIG_API_COURSE}
    learning: ${CONFIG_API_LEARNING}
    quiz: ${CONFIG_API_QUIZ}
    notice: ${CONFIG_API_NOTICE}

spring:
  application:
    name: ${config.service-name}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    consul:
      enabled: false
      config:
        enabled: false
      discovery:
        enabled: false
    bus:
      enabled: false
    stream:
      enabled: false
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_UNIQUE
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "*"
                allowed-methods: "*"
                allowed-headers: "*"
                allow-credentials: false
          discovery:
            locator:
              enabled: false
          routes:
            - id: lms-authn-continental-auth-token
              uri: ${CONFIG_API_AUTHN}
              predicates:
                - Path=/auth/token
              filters:
                - SetPath=/api/v1/auth/login

            - id: lms-authn-continental-auth-refresh
              uri: ${CONFIG_API_AUTHN}
              predicates:
                - Path=/auth/refresh
              filters:
                - SetPath=/api/v1/auth/refresh-token

            - id: lms-authn-continental-auth-userinfo
              uri: ${CONFIG_API_AUTHN}
              predicates:
                - Path=/auth/userinfo
              filters:
                - SetPath=/api/v1/auth/me

            - id: lms-authn-continental-auth
              uri: ${CONFIG_API_AUTHN}
              predicates:
                - Path=/auth/**
              filters:
                - RewritePath=/auth/(?<path>.*), /api/v1/auth/$\{path}

            - id: lms-authn-continental-users
              uri: ${CONFIG_API_AUTHN}
              predicates:
                - Path=/users/**
              filters:
                - RewritePath=/users/(?<userId>.*)/summary, /internal/v1/AuthnUser/$\{userId}/info

            - id: lms-author-continental-permissions
              uri: ${CONFIG_API_AUTHOR}
              predicates:
                - Path=/admin/permissions,/admin/permissions/**
              filters:
                - RewritePath=/admin/permissions(?<path>/?.*), /api/v1/permissions$\{path}

            - id: lms-author-continental-staff-activity
              uri: ${CONFIG_API_AUTHOR}
              predicates:
                - Path=/staff-activity/**

            - id: lms-authn-service
              uri: ${CONFIG_API_AUTHN}
              predicates:
                - Path=/authn/**
              filters:
                - RewritePath=/authn/(?<path>.*), /$\{path}

            - id: lms-author-service
              uri: ${CONFIG_API_AUTHOR}
              predicates:
                - Path=/author/**
              filters:
                - RewritePath=/author/(?<path>.*), /$\{path}

            - id: lms-course-service
              uri: ${CONFIG_API_COURSE}
              predicates:
                - Path=/course/**
              filters:
                - RewritePath=/course/(?<path>.*), /$\{path}

            - id: lms-learning-service
              uri: ${CONFIG_API_LEARNING}
              predicates:
                - Path=/learning/**
              filters:
                - RewritePath=/learning/(?<path>.*), /$\{path}

            - id: lms-quiz-service
              uri: ${CONFIG_API_QUIZ}
              predicates:
                - Path=/quiz/**
              filters:
                - RewritePath=/quiz/(?<path>.*), /$\{path}

            - id: lms-notice-service
              uri: ${CONFIG_API_NOTICE}
              predicates:
                - Path=/notice/**
              filters:
                - RewritePath=/notice/(?<path>.*), /$\{path}

  main:
    allow-bean-definition-overriding: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  show-actuator: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    urls-primary-name: lms-api-gateway-service
    urls:
      - name: lms-api-gateway-service
        url: /v3/api-docs
      - name: lms-authn-service
        url: /authn/v3/api-docs
      - name: lms-author-service
        url: /author/v3/api-docs
      - name: lms-course-service
        url: /course/v3/api-docs
      - name: lms-learning-service
        url: /learning/v3/api-docs
      - name: lms-quiz-service
        url: /quiz/v3/api-docs
      - name: lms-notice-service
        url: /notice/v3/api-docs