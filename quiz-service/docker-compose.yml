services:
  api:
    container_name: lms-quiz-service
    build:
      context: ..
      dockerfile: quiz-service/Dockerfile
    image: lms-mini/quiz-service:v1
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/lms_quiz_service?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_CLOUD_CONSUL_HOST: host.docker.internal
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_DATA_REDIS_HOST: host.docker.internal
      SPRING_DATA_REDIS_PORT: 6379
      CONFIG_MINIO_URL: http://host.docker.internal:9000
      CONFIG_MINIO_ACCESS_KEY: minioadmin
      CONFIG_MINIO_SECRET_KEY: minioadmin
      CONFIG_MINIO_BUCKET: lms-mini
    ports:
      - 8085:8085
    volumes:
      - ./logs:/app/logs
