server:
  port: 8081
  forward-headers-strategy: framework
  shutdown: graceful
  http2:
    enabled: true

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

spring:
  application:
    name: lms-authn-service
  config:
    import: optional:classpath:application-base.yaml
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/lms_authn_service?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: root
    hikari:
      schema: lms_authn_service
  cloud:
    consul:
      host: localhost
      port: 8500
      config:
        enabled: false
      discovery:
        enabled: true
        instance-id: ${spring.application.name}-${server.port}
        service-name: ${spring.application.name}
        health-check-path: /actuator/health
        prefer-ip-address: true
        health-check-interval: 15s
        register: true
        deregister: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    smtp:
      auth: true
      starttls-enable: true
      ssl-enable: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  signerKey: ${JWT_SIGNER_KEY:}
  valid-duration: 86400
  refreshable-duration: 604800

auth:
  cookie:
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    domain: ${AUTH_COOKIE_DOMAIN:}

config:
  service-name: lms-authn-service
  api:
    prefix:
      public: api
      internal: internal
      admin: admin
    version: v1
    authn: localhost:8081
    author: localhost:8082
    course: localhost:8083
    learning: localhost:8084
    quiz: localhost:8085
    notice: localhost:8086
    public:
      auth:
        register: ${config.api.prefix.public}/${config.api.version}/auth/register
        login: ${config.api.prefix.public}/${config.api.version}/auth/login
        refresh-token: ${config.api.prefix.public}/${config.api.version}/auth/refresh-token
        logout: ${config.api.prefix.public}/${config.api.version}/auth/logout
        change-password: ${config.api.prefix.public}/${config.api.version}/auth/change-password
        me: ${config.api.prefix.public}/${config.api.version}/auth/me
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
